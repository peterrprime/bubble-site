<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bubble Layout Editor v4.1</title>
  <style>
    :root{
      --bg1: #f4f5f8;
      --bg2: #e9ebf1;
      --txt: rgba(255,255,255,.94);
      --txtDark: rgba(0,0,0,.82);

      --panelBg: rgba(255,255,255,.72);
      --panelBd: rgba(0,0,0,.10);

      --bubbleSolid: rgba(0,0,0,.84);
      --bubbleGhost: rgba(0,0,0,.08);
      --bubbleBd: rgba(0,0,0,.18);
      --bubbleBdHi: rgba(0,0,0,.32);

      --line: rgba(0,0,0,.14);
    }

    html, body { height: 100%; margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body { overflow: hidden; background: var(--bg1); }

    body.mbOn .bubble { background: var(--bubbleGhost); }
    body:not(.mbOn) .bubble { background: var(--bubbleSolid); }

    .stage{
      position: fixed; inset: 0;
      background:
        radial-gradient(1200px 900px at 70% 20%, rgba(0,0,0,.06), transparent 58%),
        radial-gradient(900px 700px at 20% 70%, rgba(0,0,0,.05), transparent 58%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      user-select: none;
      z-index: 0;
    }

    canvas#mb{
      position: fixed; inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 1;
    }

      .bubbleLayer{
      position: fixed;
      inset: 0;
      z-index: 3;          /* ABOVE canvas */
      pointer-events: auto;
      }

    .topbar{
      position: fixed; left: 24px; right: 24px; top: 18px;
      height: 54px; border-radius: 999px;
      background: rgba(255,255,255,.45);
      border: 1px solid rgba(0,0,0,.12);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      color: var(--txtDark);
      box-sizing: border-box;
      z-index: 5;
      pointer-events: auto;
    }
    .brand{ font-weight: 650; letter-spacing: .2px; }
    .nav{ display: flex; gap: 12px; color: rgba(0,0,0,.64); font-size: 13px; }
    .pill{ padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(0,0,0,.14); background: rgba(255,255,255,.35); }

    svg.lines{
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 2;
    }
    .line{ stroke: var(--line); stroke-width: 1; }

    .bubble{
      position: absolute;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--txt);
      cursor: pointer;
      transform: translate(-50%, -50%);
      box-sizing: border-box;
      border: 1px solid var(--bubbleBd);
      backdrop-filter: blur(10px);
      z-index: 3;
      transition: opacity 160ms ease, filter 160ms ease, border-color 160ms ease;
    }
    body.mbOn .bubble{ border-color: rgba(0,0,0,.12); }
    .bubble:hover{ border-color: var(--bubbleBdHi); }
    .bubble.selected{ border-color: rgba(255,255,255,.65); }
    .bubble.sub{ z-index: 6; }
    .bubble.dim{
      opacity: .45;
      filter: blur(.2px);
    }

    .label{
      text-align: center;
      font-weight: 650;
      letter-spacing: .1px;
      line-height: 1.05;
      padding: 0 10px;
      pointer-events: none;
      font-size: 14px;
      color: rgba(255,255,255,.96);
      text-shadow: 0 2px 18px rgba(0,0,0,.65);
      position: relative;
      z-index: 1;
    }

    /* Fix: labels readable when metaballs are on (soft ink halo behind text) */
    body.mbOn .label::before{
      content:"";
      position:absolute;
      left:50%; top:50%;
      transform: translate(-50%,-50%);
      width: calc(100% + 28px);
      height: calc(100% + 18px);
      border-radius: 999px;
      background: radial-gradient(circle at 50% 50%,
        rgba(0,0,0,.55) 0%,
        rgba(0,0,0,.28) 45%,
        rgba(0,0,0,0) 72%
      );
      filter: blur(6px);
      z-index: -1;
      pointer-events:none;
    }

    /* Panel */
    .panel{
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: min(920px, calc(100vw - 36px));
      background: var(--panelBg);
      border: 1px solid var(--panelBd);
      border-radius: 14px;
      backdrop-filter: blur(14px);
      box-sizing: border-box;
      z-index: 10;
      color: var(--txtDark);
      box-shadow: 0 12px 50px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .panelHeader{
      display:flex;
      align-items:center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,0,0,.08);
      cursor: move;
      user-select: none;
      background: rgba(255,255,255,.35);
    }
    .panelHeader .title{
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .15px;
    }
    .panelHeader .controls{
      display:flex; gap: 8px; align-items:center;
    }
    .panelMinBtn{
      border: 1px solid rgba(0,0,0,.14);
      background: rgba(255,255,255,.40);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .panelBody{ padding: 10px 12px 12px; }
    .panel.min .panelBody{ display:none; }
    .panel.min{ width: 320px; }

    .row{ display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
    .row + .row{ margin-top: 10px; }

    .btn{
      border: 1px solid rgba(0,0,0,.14);
      background: rgba(255,255,255,.40);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      color: rgba(0,0,0,.82);
    }
    .btn:hover{ background: rgba(255,255,255,.55); }

    .toggle{ display:flex; gap: 8px; align-items:center; font-size: 13px; color: rgba(0,0,0,.64); }
    .note{ font-size: 12px; color: rgba(0,0,0,.58); line-height: 1.25; }

    .field{
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(0,0,0,.14);
      color: rgba(0,0,0,.82);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      width: 160px;
    }
    .field.wide{ width: 280px; }

    .sliderWrap{
      display:flex;
      gap: 8px;
      align-items:center;
      color: rgba(0,0,0,.62);
      font-size: 12px;
    }
    input[type="range"]{ width: 160px; }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      color: rgba(0,0,0,.62);
    }

    .divider{
      height: 1px;
      background: rgba(0,0,0,.08);
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <canvas id="mb"></canvas>
  <div id="bubbleLayer" class="bubbleLayer"></div>

  <div class="topbar">
    <a class="brand" href="index.html" style="color:inherit;text-decoration:none;">Peter Prime</a>
    <div class="nav">
      <a class="pill" href="work.html" style="color:inherit;text-decoration:none;">Work</a>
      <a class="pill" href="about.html" style="color:inherit;text-decoration:none;">About</a>
      <a class="pill" href="contact.html" style="color:inherit;text-decoration:none;">Contact</a>
    </div>
  </div>

  <svg class="lines" id="lines"></svg>

  <div class="panel" id="panel">
    <div class="panelHeader" id="panelHeader">
      <div class="title">Layout Controls</div>
      <div class="controls">
        <button class="panelMinBtn" id="minBtn">Min</button>
      </div>
    </div>

    <div class="panelBody">
      <div class="row">
        <button class="btn" id="copyMain">Copy main JSON</button>
        <button class="btn" id="downloadAll">Download ALL JSON</button>
        <button class="btn" id="addMain">Add main</button>
        <button class="btn" id="addSub">Add sub</button>
        <button class="btn" id="deleteSel">Delete selected</button>

        <label class="toggle"><input type="checkbox" id="editMode" checked /> Edit</label>
        <label class="toggle"><input type="checkbox" id="showLines" checked /> Lines</label>
        <label class="toggle"><input type="checkbox" id="autoSubs" checked /> Auto sub layout</label>
        <label class="toggle"><input type="checkbox" id="mbOn" /> Canvas metaballs</label>
        <label class="toggle"><input type="checkbox" id="dimOthers" checked /> Dim others when expanded</label>
      </div>

      <div class="divider"></div>

      <div class="row">
        <input class="field" id="selLabel" placeholder="label" />
        <input class="field wide" id="selHref" placeholder="href" />
        <label class="toggle"><input type="checkbox" id="selEnabled" /> Enabled</label>
        <label class="toggle"><input type="checkbox" id="selHasSubs" /> Subs enabled</label>
      </div>

      <div class="row">
        <div class="sliderWrap">x <input id="sx" type="range" min="0" max="1" step="0.001" value="0.5"><span class="mono" id="sxv">0.500</span></div>
        <div class="sliderWrap">y <input id="sy" type="range" min="0" max="1" step="0.001" value="0.5"><span class="mono" id="syv">0.500</span></div>
        <div class="sliderWrap">r <input id="sr" type="range" min="0.03" max="0.30" step="0.001" value="0.08"><span class="mono" id="srv">0.080</span></div>
      </div>

      <div class="divider"></div>

      <div class="row note">
        Per MAIN metaballs settings. Collapsed uses res/th. Expanded uses resExp/thExp.
      </div>

      <div class="row">
        <div class="sliderWrap">res <input id="mRes" type="range" min="160" max="640" step="20" value="320"><span class="mono" id="mResV">320</span></div>
        <div class="sliderWrap">th <input id="mTh" type="range" min="0.7" max="2.2" step="0.02" value="1.2"><span class="mono" id="mThV">1.20</span></div>
        <div class="sliderWrap">resExp <input id="mResE" type="range" min="160" max="640" step="20" value="360"><span class="mono" id="mResEV">360</span></div>
        <div class="sliderWrap">thExp <input id="mThE" type="range" min="0.7" max="2.2" step="0.02" value="1.1"><span class="mono" id="mThEV">1.10</span></div>
      </div>

      <div class="row note" id="status">Ready.</div>
    </div>
  </div>

  <script>
    // =========================
    // Layout loaded from your attached bubble-layout.all.json (kept as-is)
    // Only additions: enabled, subsEnabled, mb, child.enabled
    // =========================
    const bubbles = [
      {
        "id": "design",
        "label": "Design",
        "href": "work.html",
        "x": 0.49321266968325794,
        "y": 0.47724867724867726,
        "r": 0.20800000000000007,
        "children": [
          { "id": "design-projects", "label": "Projects", "href": "#design-projects", "r": 0.07800000000000001, "enabled": true },
          { "id": "design-portfolio", "label": "Portfolio", "href": "#portfolio", "r": 0.062000000000000006, "enabled": true },
          { "id": "design-process", "label": "Process", "href": "#process", "r": 0.056, "enabled": true }
        ],
        "enabled": true,
        "subsEnabled": true,
        "mb": { "res": 340, "th": 1.2, "resExp": 480, "thExp": 1.08 }
      },
      {
        "id": "architecture",
        "label": "Architecture",
        "href": "work.html#architecture",
        "x": 0.3180995475113122,
        "y": 0.2761904761904762,
        "r": 0.1439999999999999,
        "children": [
          { "id": "arch-projects", "label": "Projects", "href": "#arch-projects", "r": 0.07, "enabled": true },
          { "id": "arch-portfolio", "label": "Portfolio", "href": "#arch-portfolio", "r": 0.052, "enabled": true },
          { "id": "arch-programs", "label": "Programs", "href": "#arch-programs", "r": 0.06, "enabled": true },
          { "id": "architecture-sub-bbdd4", "label": "Subsub", "href": "#subsub", "r": 0.03, "enabled": true }
        ],
        "enabled": true,
        "subsEnabled": true,
        "mb": { "res": 320, "th": 1.22, "resExp": 520, "thExp": 1.06 }
      },
      {
        "id": "ai",
        "label": "AI",
        "href": "about.html#ai",
        "x": 0.7149321266968326,
        "y": 0.2761904761904762,
        "r": 0.14800000000000005,
        "children": [
          { "id": "ai-tools", "label": "Tools", "href": "#ai-tools", "r": 0.06, "enabled": true },
          { "id": "ai-projects", "label": "Projects", "href": "#ai-projects", "r": 0.07, "enabled": true }
        ],
        "enabled": true,
        "subsEnabled": true,
        "mb": { "res": 320, "th": 1.18, "resExp": 460, "thExp": 1.06 }
      },
      {
        "id": "web",
        "label": "Web Design",
        "href": "work.html#web",
        "x": 0.8144796380090498,
        "y": 0.6365079365079365,
        "r": 0.14599999999999994,
        "children": [
          { "id": "web-sites", "label": "Sites", "href": "#web-sites", "r": 0.068, "enabled": true },
          { "id": "web-systems", "label": "Systems", "href": "#web-systems", "r": 0.058, "enabled": true },
          { "id": "web-uiux", "label": "UI UX", "href": "#web-uiux", "r": 0.058, "enabled": true }
        ],
        "enabled": true,
        "subsEnabled": true,
        "mb": { "res": 300, "th": 1.2, "resExp": 460, "thExp": 1.08 }
      },
      {
        "id": "code",
        "label": "Coding",
        "href": "work.html#coding",
        "x": 0.532579185520362,
        "y": 0.8624338624338624,
        "r": 0.10600000000000004,
        "children": [
          { "id": "code-projects", "label": "Projects", "href": "#code-projects", "r": 0.064, "enabled": true },
          { "id": "code-stack", "label": "Stack", "href": "#code-stack", "r": 0.056, "enabled": true }
        ],
        "enabled": true,
        "subsEnabled": true,
        "mb": { "res": 280, "th": 1.22, "resExp": 420, "thExp": 1.1 }
      },
      {
        "id": "photo",
        "label": "Photography",
        "href": "work.html#photography",
        "x": 0.2330316742081448,
        "y": 0.6931216931216931,
        "r": 0.10600000000000004,
        "children": [
          { "id": "photo-gallery", "label": "Gallery", "href": "#photo-gallery", "r": 0.062, "enabled": true },
          { "id": "photo-sets", "label": "Sets", "href": "#photo-sets", "r": 0.054, "enabled": true }
        ],
        "enabled": true,
        "subsEnabled": true,
        "mb": { "res": 260, "th": 1.26, "resExp": 420, "thExp": 1.12 }
      }
    ];

    // later: collision avoidance needed (not in Phase 1)
    const SUB_GAP = 0.018;
    const SUB_RING = 1.35;

    // Layout Controls is a dev tool, not for visitors. Hidden unless ?edit=1.
    const DEV_MODE = new URLSearchParams(location.search).get("edit") === "1";

    // =========================
    // DOM refs
    // =========================
    const stage = document.getElementById("stage");
    const bubbleLayer = document.getElementById("bubbleLayer");
    const svg = document.getElementById("lines");
    const statusEl = document.getElementById("status");

    const editModeEl = document.getElementById("editMode");
    const showLinesEl = document.getElementById("showLines");
    const autoSubsEl = document.getElementById("autoSubs");
    const mbOnEl = document.getElementById("mbOn");
    const dimOthersEl = document.getElementById("dimOthers");

    const selLabelEl = document.getElementById("selLabel");
    const selHrefEl  = document.getElementById("selHref");
    const selEnabledEl = document.getElementById("selEnabled");
    const selHasSubsEl = document.getElementById("selHasSubs");

    const sx = document.getElementById("sx"), sy = document.getElementById("sy"), sr = document.getElementById("sr");
    const sxv = document.getElementById("sxv"), syv = document.getElementById("syv"), srv = document.getElementById("srv");

    const mRes = document.getElementById("mRes"), mTh = document.getElementById("mTh");
    const mResE = document.getElementById("mResE"), mThE = document.getElementById("mThE");
    const mResV = document.getElementById("mResV"), mThV = document.getElementById("mThV");
    const mResEV = document.getElementById("mResEV"), mThEV = document.getElementById("mThEV");

    const panel = document.getElementById("panel");
    const panelHeader = document.getElementById("panelHeader");
    const minBtn = document.getElementById("minBtn");

    const mbCanvas = document.getElementById("mb");
    const mbCtx = mbCanvas.getContext("2d");

    // =========================
    // State
    // =========================
    let domByKey = new Map(); // key -> el
    let expandedMainId = null;
    let selected = null; // {type:"main"|"sub", mainId, subId, key}
    let drag = null;

    // subState stores positions for subs when expanded and pinned
    const subState = {}; // subState[mainId][subId] = {x,y,r,pinned}

    let dirty = true;

    // =========================
    // Helpers
    // =========================
    const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
    const minDim = () => Math.min(window.innerWidth, window.innerHeight);
    const toPxX = (x) => x * window.innerWidth;
    const toPxY = (y) => y * window.innerHeight;
    const toPxR = (r) => r * minDim();

    const keyMain = (id) => `m:${id}`;
    const keySub  = (mid, sid) => `s:${mid}:${sid}`;

    const getMain = (id) => bubbles.find(b => b.id === id);
    const getSub = (mid, sid) => getMain(mid)?.children?.find(c => c.id === sid);

    function setStatus(msg){ statusEl.textContent = msg; }

    function ensureSubState(mid){
      if (!subState[mid]) subState[mid] = {};
      const m = getMain(mid);
      if (!m?.children) return;
      for (const c of m.children){
        if (!subState[mid][c.id]) subState[mid][c.id] = { x:null, y:null, r:c.r, pinned:false };
        subState[mid][c.id].r = c.r;
      }
    }

    function computeSubPositions(mid){
      const m = getMain(mid);
      if (!m?.children?.length) return;

      ensureSubState(mid);

      const kids = m.children.filter(c => c.enabled !== false);
      const count = kids.length;
      if (!count) return;

      const angle0 = -Math.PI / 2;

      for (let i=0;i<count;i++){
        const c = kids[i];
        const st = subState[mid][c.id];

        if (st.pinned && st.x != null && st.y != null) continue;
        if (!autoSubsEl.checked && st.x != null && st.y != null) continue;

        const ring = (m.r + st.r + SUB_GAP) * SUB_RING;
        const a = angle0 + i * (2*Math.PI / count);

        st.x = clamp(m.x + Math.cos(a) * ring, 0.02, 0.98);
        st.y = clamp(m.y + Math.sin(a) * ring, 0.06, 0.98);
      }
    }

    // =========================
    // Bubble DOM
    // =========================
    function createBubbleEl({key, label, isSub}){
      const el = document.createElement("div");
      el.className = "bubble" + (isSub ? " sub" : "");
      el.dataset.key = key;

      const lab = document.createElement("div");
      lab.className = "label";
      lab.textContent = label;
      el.appendChild(lab);

      el.addEventListener("pointerdown", (e) => onPointerDown(e, key));
      el.addEventListener("click", (e) => onClick(e, key));
      el.addEventListener("wheel", (e) => onWheel(e, key), { passive:false });

      bubbleLayer.appendChild(el);
      domByKey.set(key, el);
      return el;
    }

    function setElLabel(key, text){
      const el = domByKey.get(key);
      const lab = el?.querySelector(".label");
      if (lab) lab.textContent = text;
    }

    function layoutEl(key, x, y, r){
      const el = domByKey.get(key);
      if (!el) return;

      el.style.left = `${toPxX(x)}px`;
      el.style.top  = `${toPxY(y)}px`;

      const d = toPxR(r) * 2;
      el.style.width = `${d}px`;
      el.style.height = `${d}px`;

      el.classList.toggle("selected", selected?.key === key);
    }

    function setDimStates(){
      for (const b of bubbles){
        const el = domByKey.get(keyMain(b.id));
        if (!el) continue;
        const shouldDim = dimOthersEl.checked && expandedMainId && b.id !== expandedMainId;
        el.classList.toggle("dim", !!shouldDim);
      }
      svg.style.opacity = (dimOthersEl.checked && expandedMainId) ? "0.35" : "1";
    }

    // =========================
    // Lines
    // =========================
    function drawLines(){
      svg.innerHTML = "";
      if (!showLinesEl.checked) return;

      const center = getMain("design") || bubbles[0];
      if (!center) return;

      const w = window.innerWidth, h = window.innerHeight;
      svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
      svg.setAttribute("width", w);
      svg.setAttribute("height", h);

      const cx = toPxX(center.x), cy = toPxY(center.y);

      for (const b of bubbles){
        if (!b.enabled) continue;
        if (b.id === center.id) continue;
        const x = toPxX(b.x), y = toPxY(b.y);

        const line = document.createElementNS("http://www.w3.org/2000/svg","line");
        line.setAttribute("x1", cx); line.setAttribute("y1", cy);
        line.setAttribute("x2", x);  line.setAttribute("y2", y);
        line.setAttribute("class", "line");
        svg.appendChild(line);
      }
    }

    // =========================
    // Render layout
    // =========================
    function ensureMainNodes(){
      for (const b of bubbles){
        const k = keyMain(b.id);
        if (!b.enabled){
          if (domByKey.has(k)){
            domByKey.get(k).remove();
            domByKey.delete(k);
          }
          continue;
        }
        if (!domByKey.has(k)){
          createBubbleEl({ key:k, label:b.label, isSub:false });
        } else {
          setElLabel(k, b.label);
        }
      }
      for (const k of [...domByKey.keys()]){
        if (k.startsWith("m:")){
          const id = k.slice(2);
          const m = getMain(id);
          if (!m || !m.enabled){
            domByKey.get(k)?.remove();
            domByKey.delete(k);
          }
        }
      }
    }

    function ensureSubNodes(mid){
      const m = getMain(mid);
      if (!m?.children) return;

      ensureSubState(mid);

      for (const c of m.children){
        const k = keySub(mid, c.id);
        if (c.enabled === false){
          if (domByKey.has(k)){
            domByKey.get(k).remove();
            domByKey.delete(k);
          }
          continue;
        }
        if (!domByKey.has(k)){
          createBubbleEl({ key:k, label:c.label, isSub:true });
        } else {
          setElLabel(k, c.label);
        }
      }

      for (const k of [...domByKey.keys()]){
        if (k.startsWith(`s:${mid}:`)){
          const sid = k.split(":").slice(2).join(":");
          const c = getSub(mid, sid);
          if (!c || c.enabled === false){
            domByKey.get(k)?.remove();
            domByKey.delete(k);
          }
        }
      }
    }

    function removeAllSubs(){
      for (const k of [...domByKey.keys()]){
        if (k.startsWith("s:")){
          domByKey.get(k)?.remove();
          domByKey.delete(k);
        }
      }
    }

    function renderLayout(){
      ensureMainNodes();

      for (const b of bubbles){
        if (!b.enabled) continue;
        layoutEl(keyMain(b.id), b.x, b.y, b.r);
      }

      drawLines();

      if (expandedMainId){
        const m = getMain(expandedMainId);
        if (!m || !m.enabled || !m.subsEnabled){
          expandedMainId = null;
          removeAllSubs();
        } else {
          computeSubPositions(expandedMainId);
          ensureSubNodes(expandedMainId);

          const kids = m.children.filter(c => c.enabled !== false);
          for (const c of kids){
            const st = subState[expandedMainId][c.id];
            layoutEl(keySub(expandedMainId, c.id), st.x, st.y, st.r);
          }
        }
      }

      for (const [k, el] of domByKey.entries()){
        el.classList.toggle("selected", selected?.key === k);
      }

      setDimStates();
      dirty = true;
      setStatus(`Main: ${bubbles.filter(b=>b.enabled).length} | Expanded: ${expandedMainId || "none"} | Selected: ${selected?.key || "none"}`);
    }

    // =========================
    // Selection + UI sync
    // =========================
    function setSelected(key){
      selected = null;
      if (!key){
        selLabelEl.value = "";
        selHrefEl.value = "";
        selEnabledEl.checked = false;
        selHasSubsEl.checked = false;
        syncSliders(null);
        syncMb(null);
        renderLayout();
        return;
      }

      if (key.startsWith("m:")){
        const id = key.slice(2);
        const m = getMain(id);
        selected = { type:"main", mainId:id, subId:null, key };

        selLabelEl.value = m?.label || "";
        selHrefEl.value = m?.href || "";
        selEnabledEl.checked = m?.enabled !== false;
        selHasSubsEl.checked = m?.subsEnabled !== false;

        syncSliders(selected);
        syncMb(selected);
      } else {
        const parts = key.split(":");
        const mid = parts[1];
        const sid = parts.slice(2).join(":");
        const c = getSub(mid, sid);
        selected = { type:"sub", mainId:mid, subId:sid, key };

        selLabelEl.value = c?.label || "";
        selHrefEl.value = c?.href || "";
        selEnabledEl.checked = c?.enabled !== false;
        selHasSubsEl.checked = false;

        syncSliders(selected);
        syncMb({ type:"main", mainId:mid });
      }

      renderLayout();
    }

    function syncSliders(sel){
      let x=0.5,y=0.5,r=0.08;
      if (!sel){
        sx.value = x; sy.value = y; sr.value = r;
      } else if (sel.type === "main"){
        const m = getMain(sel.mainId);
        x = m.x; y = m.y; r = m.r;
      } else {
        ensureSubState(sel.mainId);
        const st = subState[sel.mainId][sel.subId];
        const parent = getMain(sel.mainId);
        x = st.x ?? parent.x;
        y = st.y ?? parent.y;
        r = st.r ?? getSub(sel.mainId, sel.subId).r;
      }
      sx.value = x; sy.value = y; sr.value = r;
      sxv.textContent = (+x).toFixed(3);
      syv.textContent = (+y).toFixed(3);
      srv.textContent = (+r).toFixed(3);
    }

    function syncMb(sel){
      if (!sel || sel.type !== "main"){
        mRes.disabled = true; mTh.disabled = true; mResE.disabled = true; mThE.disabled = true;
        return;
      }
      const m = getMain(sel.mainId);
      if (!m.mb) m.mb = { res:320, th:1.2, resExp:420, thExp:1.1 };

      mRes.disabled = false; mTh.disabled = false; mResE.disabled = false; mThE.disabled = false;

      mRes.value = m.mb.res;
      mTh.value  = m.mb.th;
      mResE.value = m.mb.resExp;
      mThE.value  = m.mb.thExp;

      mResV.textContent = m.mb.res;
      mThV.textContent  = (+m.mb.th).toFixed(2);
      mResEV.textContent = m.mb.resExp;
      mThEV.textContent  = (+m.mb.thExp).toFixed(2);
    }

    function applySlidersToSelected(){
      if (!selected) return;

      const x = +sx.value, y = +sy.value, r = +sr.value;
      sxv.textContent = x.toFixed(3);
      syv.textContent = y.toFixed(3);
      srv.textContent = r.toFixed(3);

      if (selected.type === "main"){
        const m = getMain(selected.mainId);
        m.x = clamp(x, 0.02, 0.98);
        m.y = clamp(y, 0.06, 0.98);
        m.r = clamp(r, 0.04, 0.30);
      } else {
        ensureSubState(selected.mainId);
        const st = subState[selected.mainId][selected.subId];
        st.x = clamp(x, 0.02, 0.98);
        st.y = clamp(y, 0.06, 0.98);
        st.r = clamp(r, 0.03, 0.20);
        st.pinned = true;
        const c = getSub(selected.mainId, selected.subId);
        if (c) c.r = st.r;
      }

      renderLayout();
    }

    function applyMbToSelectedMain(){
      if (!selected) return;
      const mid = selected.mainId;
      const m = getMain(mid);
      if (!m) return;
      if (!m.mb) m.mb = { res:320, th:1.2, resExp:420, thExp:1.1 };

      m.mb.res = +mRes.value;
      m.mb.th  = +mTh.value;
      m.mb.resExp = +mResE.value;
      m.mb.thExp  = +mThE.value;

      mResV.textContent = m.mb.res;
      mThV.textContent  = (+m.mb.th).toFixed(2);
      mResEV.textContent = m.mb.resExp;
      mThEV.textContent  = (+m.mb.thExp).toFixed(2);

      dirty = true;
    }

    // =========================
    // Events: bubbles
    // =========================
    function onClick(e, key){
      e.stopPropagation();

      // Deployed (non-edit) mode: a click just navigates, it doesn't select/expand.
      if (!DEV_MODE && key.startsWith("m:")){
        const m = getMain(key.slice(2));
        if (m && m.href && m.href !== "#"){
          window.location.href = m.href;
          return;
        }
      }

      setSelected(key);

      if (key.startsWith("m:")){
        const id = key.slice(2);
        const m = getMain(id);
        if (!m || !m.enabled) return;

        if (!m.subsEnabled){
          expandedMainId = null;
          removeAllSubs();
          renderLayout();
          return;
        }

        if (expandedMainId === id){
          expandedMainId = null;
          removeAllSubs();
        } else {
          expandedMainId = id;
          removeAllSubs();
        }
        renderLayout();
      }
    }

    function onPointerDown(e, key){
      if (!editModeEl.checked) return;
      drag = { key, pointerId: e.pointerId };
      e.currentTarget.setPointerCapture(e.pointerId);
    }

    function onWheel(e, key){
      if (!editModeEl.checked) return;
      e.preventDefault();

      const delta = Math.sign(e.deltaY) * 0.008;

      if (key.startsWith("m:")){
        const m = getMain(key.slice(2));
        if (!m) return;
        m.r = clamp(m.r - delta, 0.04, 0.30);
      } else {
        const parts = key.split(":");
        const mid = parts[1];
        const sid = parts.slice(2).join(":");
        ensureSubState(mid);
        const st = subState[mid][sid];
        st.r = clamp((st.r ?? 0.06) - delta, 0.03, 0.20);
        st.pinned = true;
        const c = getSub(mid, sid);
        if (c) c.r = st.r;
      }

      renderLayout();
      if (selected?.key === key) syncSliders(selected);
    }

    window.addEventListener("pointermove", (e) => {
      if (!drag) return;

      const x = clamp(e.clientX / window.innerWidth, 0.02, 0.98);
      const y = clamp(e.clientY / window.innerHeight, 0.06, 0.98);

      if (drag.key.startsWith("m:")){
        const m = getMain(drag.key.slice(2));
        if (!m) return;
        m.x = x; m.y = y;
      } else {
        const parts = drag.key.split(":");
        const mid = parts[1];
        const sid = parts.slice(2).join(":");
        ensureSubState(mid);
        subState[mid][sid].x = x;
        subState[mid][sid].y = y;
        subState[mid][sid].pinned = true;
      }

      renderLayout();
      if (selected?.key === drag.key) syncSliders(selected);
    });

    window.addEventListener("pointerup", () => { drag = null; });

    bubbleLayer.addEventListener("click", () => {
      expandedMainId = null;
      removeAllSubs();
      setSelected(null);
      renderLayout();
    });

    // =========================
    // Panel: draggable + collapsible + persistent pos
    // =========================
    function loadPanelPos(){
      try{
        const raw = localStorage.getItem("panelPos");
        if (!raw) return;
        const p = JSON.parse(raw);
        if (typeof p.left === "number") panel.style.left = p.left + "px";
        if (typeof p.top === "number") { panel.style.top = p.top + "px"; panel.style.bottom = "auto"; }
        if (p.min === true) { panel.classList.add("min"); minBtn.textContent = "Max"; }
      }catch{}
    }
    function savePanelPos(){
      const rect = panel.getBoundingClientRect();
      localStorage.setItem("panelPos", JSON.stringify({ left: rect.left, top: rect.top, min: panel.classList.contains("min") }));
    }
    let panelDrag = null;
    panelHeader.addEventListener("pointerdown", (e) => {
      if (e.target === minBtn) return;
      panelDrag = { x: e.clientX, y: e.clientY };
      panelHeader.setPointerCapture(e.pointerId);
    });
    panelHeader.addEventListener("pointermove", (e) => {
      if (!panelDrag) return;
      const rect = panel.getBoundingClientRect();
      const nx = rect.left + (e.clientX - panelDrag.x);
      const ny = rect.top  + (e.clientY - panelDrag.y);
      panelDrag = { x: e.clientX, y: e.clientY };

      panel.style.left = clamp(nx, 8, window.innerWidth - rect.width - 8) + "px";
      panel.style.top  = clamp(ny, 8, window.innerHeight - rect.height - 8) + "px";
      panel.style.bottom = "auto";
      savePanelPos();
    });
    panelHeader.addEventListener("pointerup", () => { panelDrag = null; });

    minBtn.addEventListener("click", () => {
      panel.classList.toggle("min");
      minBtn.textContent = panel.classList.contains("min") ? "Max" : "Min";
      savePanelPos();
    });

    // =========================
    // UI buttons + direct edits
    // =========================
    document.getElementById("copyMain").addEventListener("click", async () => {
      const payload = JSON.stringify(
        bubbles
          .filter(b => b.enabled)
          .map(({children, mb, enabled, subsEnabled, ...rest}) => rest),
        null, 2
      );
      await navigator.clipboard.writeText(payload);
      setStatus("Copied main JSON.");
    });

    document.getElementById("downloadAll").addEventListener("click", () => {
      const payload = JSON.stringify(bubbles, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "bubble-layout.all.json";
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus("Downloaded ALL JSON.");
    });

    document.getElementById("addMain").addEventListener("click", () => {
      const id = `new-${Math.random().toString(16).slice(2,8)}`;
      bubbles.push({
        id, label:"New", href:"#", x:0.5, y:0.5, r:0.08,
        enabled:true, subsEnabled:true,
        mb:{res:320, th:1.2, resExp:420, thExp:1.1},
        children:[]
      });
      renderLayout();
      setSelected(keyMain(id));
    });

    document.getElementById("addSub").addEventListener("click", () => {
      if (!selected || selected.type !== "main"){
        setStatus("Select a MAIN bubble to add a sub.");
        return;
      }
      const m = getMain(selected.mainId);
      if (!m.children) m.children = [];
      const sid = `${m.id}-sub-${Math.random().toString(16).slice(2,7)}`;
      m.children.push({ id:sid, label:"Sub", href:"#", r: Math.max(0.05, m.r * 0.55), enabled:true });
      ensureSubState(m.id);
      subState[m.id][sid] = { x:null, y:null, r: m.children.at(-1).r, pinned:false };

      expandedMainId = m.id;
      renderLayout();
      setSelected(keySub(m.id, sid));
    });

    document.getElementById("deleteSel").addEventListener("click", () => {
      if (!selected){ setStatus("Nothing selected."); return; }

      if (selected.type === "main"){
        const idx = bubbles.findIndex(b => b.id === selected.mainId);
        if (idx >= 0){
          bubbles.splice(idx, 1);
          delete subState[selected.mainId];
          if (expandedMainId === selected.mainId){
            expandedMainId = null;
            removeAllSubs();
          }
          setSelected(null);
          renderLayout();
        }
      } else {
        const m = getMain(selected.mainId);
        if (!m?.children) return;
        const idx = m.children.findIndex(c => c.id === selected.subId);
        if (idx >= 0){
          m.children.splice(idx, 1);
          if (subState[selected.mainId]) delete subState[selected.mainId][selected.subId];
          setSelected(null);
          renderLayout();
        }
      }
    });

    selLabelEl.addEventListener("input", () => {
      if (!selected) return;
      const v = selLabelEl.value.trim() || "Untitled";
      if (selected.type === "main") getMain(selected.mainId).label = v;
      else getSub(selected.mainId, selected.subId).label = v;
      renderLayout();
    });

    selHrefEl.addEventListener("input", () => {
      if (!selected) return;
      const v = selHrefEl.value.trim() || "#";
      if (selected.type === "main") getMain(selected.mainId).href = v;
      else getSub(selected.mainId, selected.subId).href = v;
    });

    selEnabledEl.addEventListener("change", () => {
      if (!selected) return;
      if (selected.type === "main"){
        getMain(selected.mainId).enabled = selEnabledEl.checked;
        if (!selEnabledEl.checked && expandedMainId === selected.mainId){
          expandedMainId = null;
          removeAllSubs();
        }
      } else {
        getSub(selected.mainId, selected.subId).enabled = selEnabledEl.checked;
      }
      renderLayout();
      setSelected(null);
    });

    selHasSubsEl.addEventListener("change", () => {
      if (!selected || selected.type !== "main") return;
      const m = getMain(selected.mainId);
      m.subsEnabled = selHasSubsEl.checked;
      if (!m.subsEnabled && expandedMainId === m.id){
        expandedMainId = null;
        removeAllSubs();
      }
      renderLayout();
    });

    sx.addEventListener("input", () => { sxv.textContent = (+sx.value).toFixed(3); applySlidersToSelected(); });
    sy.addEventListener("input", () => { syv.textContent = (+sy.value).toFixed(3); applySlidersToSelected(); });
    sr.addEventListener("input", () => { srv.textContent = (+sr.value).toFixed(3); applySlidersToSelected(); });

    showLinesEl.addEventListener("change", renderLayout);
    autoSubsEl.addEventListener("change", renderLayout);

    mbOnEl.addEventListener("change", () => {
      document.body.classList.toggle("mbOn", mbOnEl.checked);
      dirty = true;
    });

    dimOthersEl.addEventListener("change", renderLayout);

    mRes.addEventListener("input", () => { mResV.textContent = mRes.value; applyMbToSelectedMain(); });
    mTh.addEventListener("input",  () => { mThV.textContent  = (+mTh.value).toFixed(2); applyMbToSelectedMain(); });
    mResE.addEventListener("input", () => { mResEV.textContent = mResE.value; applyMbToSelectedMain(); });
    mThE.addEventListener("input",  () => { mThEV.textContent  = (+mThE.value).toFixed(2); applyMbToSelectedMain(); });

    // =========================
    // Canvas metaballs (multi-pass per MAIN bubble)
    // Added: subtle rim gradient (edge slightly lighter than core)
    // =========================
    function resizeCanvas(){
      mbCanvas.width  = Math.floor(window.innerWidth * devicePixelRatio);
      mbCanvas.height = Math.floor(window.innerHeight * devicePixelRatio);
      dirty = true;
    }

    function getClusterBalls(mainId){
      const m = getMain(mainId);
      if (!m || !m.enabled) return [];

      const w = window.innerWidth, h = window.innerHeight, md = minDim();
      const balls = [{ x: m.x * w, y: m.y * h, r: m.r * md }];

      const includeSubs = (expandedMainId === mainId) && m.subsEnabled;
      if (includeSubs && m.children?.length){
        ensureSubState(mainId);
        for (const c of m.children){
          if (c.enabled === false) continue;
          const st = subState[mainId][c.id];
          balls.push({
            x: (st.x ?? m.x) * w,
            y: (st.y ?? m.y) * h,
            r: (st.r ?? c.r) * md
          });
        }
      }
      return balls;
    }

    function drawMetaballsPass({balls, res, th}){
      const w = window.innerWidth, h = window.innerHeight;

      const scale = Math.min(res / Math.max(w,h), 1);
      const rw = Math.max(140, Math.floor(w * scale));
      const rh = Math.max(140, Math.floor(h * scale));

      const tmp = document.createElement("canvas");
      tmp.width = rw; tmp.height = rh;
      const tctx = tmp.getContext("2d");

      const img = tctx.createImageData(rw, rh);
      const data = img.data;

      for (let y=0; y<rh; y++){
        const py = (y / rh) * h;
        for (let x=0; x<rw; x++){
          const px = (x / rw) * w;

          let f = 0;
          for (let i=0;i<balls.length;i++){
            const dx = px - balls[i].x;
            const dy = py - balls[i].y;
            const d2 = dx*dx + dy*dy + 1e-6;
            f += (balls[i].r * balls[i].r) / d2;
          }

          const v = f - th;
          const a = clamp(v * 0.9, 0, 1);

          // rim gradient: edge slightly lighter than core
          const core = clamp((f - (th + 0.55)) / 1.25, 0, 1); // 0 edge -> 1 deep interior
          const rim = 1 - core;                               // 1 edge -> 0 core
          const shade = Math.floor(rim * 14);                 // 0..14 subtle

          const idx = (y*rw + x) * 4;
          data[idx+0] = shade;
          data[idx+1] = shade;
          data[idx+2] = shade;
          data[idx+3] = Math.floor(a * 255);
        }
      }

      tctx.putImageData(img, 0, 0);

      mbCtx.drawImage(tmp, 0, 0, w, h);
    }

    function drawMetaballs(){
      mbCtx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
      mbCtx.clearRect(0,0,window.innerWidth, window.innerHeight);

      if (!mbOnEl.checked) return;

      for (const b of bubbles){
        if (!b.enabled) continue;

        const useExp = (expandedMainId === b.id);
        const res = useExp ? (b.mb?.resExp ?? 420) : (b.mb?.res ?? 320);
        const th  = useExp ? (b.mb?.thExp  ?? 1.10) : (b.mb?.th  ?? 1.20);

        const balls = getClusterBalls(b.id);
        if (balls.length) drawMetaballsPass({ balls, res, th });
      }
    }

    function tick(){
      if (dirty){
        drawMetaballs();
        dirty = false;
      }
      requestAnimationFrame(tick);
    }

    // =========================
    // Init
    // =========================
    function init(){
      if (!DEV_MODE){
        panel.style.display = "none";
        editModeEl.checked = false; // visitors shouldn't be able to drag bubbles
      }
      loadPanelPos();
      resizeCanvas();
      document.body.classList.toggle("mbOn", mbOnEl.checked);
      renderLayout();
      tick();
    }

    window.addEventListener("resize", () => { resizeCanvas(); renderLayout(); });

    init();
  </script>
</body>
</html>
